<!DOCTYPE html>
<html>
<head>
<title>For Zara ❤️</title>

<style>

body{
background:#ffdde1;
font-family:Arial;
text-align:center;
padding-top:100px;
overflow:hidden;
}

h1{
font-size:60px;
color:#ff0066;
}

p{
font-size:25px;
width:70%;
margin:auto;
}

button{
margin-top:40px;
padding:20px;
font-size:22px;
background:#ff4d6d;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

#letter{
display:none;
margin-top:40px;
font-size:28px;
color:#cc0052;
}

.heart{
position:fixed;
font-size:30px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}

</style>

</head>

<body>

<h1>❤️ Zara ❤️</h1>

<p>
Distance means so little when someone means so much.
Every day with you is my favorite chapter.
</p>

<button onclick="surprise()">
🌹 Click Me 🌹
</button>

<div id="letter">

I love you more than words can describe.

No matter how many kilometers separate us,
my heart always finds its way to you.

Forever yours ❤️

</div>

<script>

function surprise(){

document.getElementById("letter").style.display="block";

setInterval(function(){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.className="heart";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*40)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},200);

}

</script>

</body>
</html>
